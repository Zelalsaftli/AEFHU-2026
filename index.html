      @keyframes fade-in {
        from { opacity: 0; transform: scale(0.95); }

      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      @media print {
        .no-print {
          display: none !important;
        }
        body {
          background-color: white;
        }
        .print-break-inside-avoid {
          page-break-inside: avoid;
        }
      }
